name: images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [gate-scale, picolimbo, minecraft]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: nix build --impure ".#${{ matrix.image }}-image"
      - run: docker load -i result
      - name: Push image tags
        run: |
          set -euo pipefail
          src="ghcr.io/${GITHUB_REPOSITORY}/${{ matrix.image }}:dev"
          sha_tag="ghcr.io/${GITHUB_REPOSITORY}/${{ matrix.image }}:${GITHUB_SHA}"
          docker tag "${src}" "${sha_tag}"
          docker push "${sha_tag}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            env_tag="ghcr.io/${GITHUB_REPOSITORY}/${{ matrix.image }}:main"
            docker tag "${src}" "${env_tag}"
            docker push "${env_tag}"
          fi

  deploy:
    needs: images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: prod-terraform
      cancel-in-progress: false
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_minecraft_domain: ${{ vars.MINECRAFT_DOMAIN }}
      TF_VAR_azure_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
      TF_VAR_resource_name_prefix: ${{ vars.RESOURCE_NAME_PREFIX }}
      TF_VAR_velocity_forwarding_secret: ${{ secrets.VELOCITY_FORWARDING_SECRET }}
      TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
      TF_STATE_STORAGE_ACCOUNT_NAME: ${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}
      TF_STATE_CONTAINER_NAME: ${{ vars.TF_STATE_CONTAINER_NAME || 'tfstate' }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'mc-server-prod.tfstate' }}
      CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TF_STATE_CONTAINER_NAME}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Terraform apply
        run: |
          set -euo pipefail

          args=(
            -auto-approve
            -var "image_repository=ghcr.io/${GITHUB_REPOSITORY}"
            -var "image_tag=${GITHUB_SHA}"
          )

          if [[ -n "${CONTAINER_REGISTRY_USERNAME}" ]]; then
            args+=(-var "container_registry_username=${CONTAINER_REGISTRY_USERNAME}")
          fi

          if [[ -n "${CONTAINER_REGISTRY_PASSWORD}" ]]; then
            args+=(-var "container_registry_password=${CONTAINER_REGISTRY_PASSWORD}")
          fi

          terraform -chdir=infra apply "${args[@]}"
